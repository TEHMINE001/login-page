<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">
    <div class="form-section">

        <h2>Get Started Now</h2>

        <form>

            <label>Name</label>
            <input type="text" placeholder="Enter your name">

            <label>Email address</label>
            <input type="email" placeholder="Enter your email">

            <label>Password</label>
            <input type="password" placeholder="Enter password">

            <div class="terms">
                <input type="checkbox">
                <span>I agree to the terms & policy</span>
            </div>

            <button class="signup-btn">Signup</button>

            <div class="divider">Or</div>

            <div class="social-login">

                <button class="google">
                    <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png">
                    Sign in with Google
                </button>

                <button class="apple">
                    <img src="https://cdn-icons-png.flaticon.com/512/731/731985.png">
                    Sign in with Apple
                </button>

            </div>

            <p class="signin">Have an account? <a href="#">Sign In</a></p>

        </form>

    </div>


    <div class="image-section">
        <img src="image.png">
    </div>

</div>

</body>
</html>
